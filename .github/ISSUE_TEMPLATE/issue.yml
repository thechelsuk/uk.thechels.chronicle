name: Issue
about: File a general issue or suggestion
labels: []
body:
  - type: input
    id: title
    attributes:
      label: Title
      description: Short summary of the issue
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please describe the issue or suggestion in detail
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Related URL (optional)
      description: Link to relevant page, resource, or context
    validations:
      required: false
