---
layout: default
---
{% capture body %}{{ content | strip }}{% endcapture %}

<article class="entry-card">
    <p class="entry-kicker"><a href="{{ '/' | relative_url }}">Nuchronic</a></p>
    <h1 class="entry-title">{{ page.title }}</h1>
    {% if body != "" %}
    <div class="entry-body">
        {{ content }}
    </div>
    {% endif %}
</article>
